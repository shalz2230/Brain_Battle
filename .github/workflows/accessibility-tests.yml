name: Accessibility Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Accessibility Suite
      working-directory: ComprehensiveE2ETests
      run: npx mocha tests/accessibility.test.js || true
    - name: Upload axe report
      uses: actions/upload-artifact@v4
      with:
        name: axe-report
        path: ComprehensiveE2ETests/
        retention-days: 30
